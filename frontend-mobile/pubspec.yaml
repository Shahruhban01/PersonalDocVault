name: frontend_mobile
description: "Flutter client for Personal Vault"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & Routing
  get: ^4.6.6
  
  # Local Cache
  get_storage: ^2.1.1
  
  # Network Client
  dio: ^5.4.3
  
  # Local Biometrics Authentication
  local_auth: ^2.2.0
  
  # Cryptography
  cryptography: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
