# ============================================================
# Nginx Configuration — Personal Vault Production
# Frontend : https://vault.developerruhban.online
# Backend  : https://vaultapi.developerruhban.online
# ============================================================

# ── Redirect HTTP → HTTPS for Frontend ─────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name vault.developerruhban.online;
    return 301 https://$host$request_uri;
}

# ── Redirect HTTP → HTTPS for API ──────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name vaultapi.developerruhban.online;
    return 301 https://$host$request_uri;
}

# ── Frontend HTTPS Server ───────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vault.developerruhban.online;

    # SSL Certificate (Let's Encrypt via Certbot)
    ssl_certificate     /etc/letsencrypt/live/vault.developerruhban.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vault.developerruhban.online/privkey.pem;

    # SSL Hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://vaultapi.developerruhban.online https://*.r2.cloudflarestorage.com; img-src 'self' data: blob:; worker-src blob:; frame-ancestors 'none';" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    # Max upload size
    client_max_body_size 6M;

    # Serve Vite static build
    root /var/www/docvault/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed assets
    location ~* \.(css|js|woff2?|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }
}

# ── Backend API HTTPS Server ────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vaultapi.developerruhban.online;

    # SSL Certificate (Let's Encrypt via Certbot)
    ssl_certificate     /etc/letsencrypt/live/vaultapi.developerruhban.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vaultapi.developerruhban.online/privkey.pem;

    # SSL Hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Max upload size (matches Multer limit)
    client_max_body_size 6M;

    # Reverse proxy to Node.js PM2 process
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
